<svg xmlns="http://www.w3.org/2000/svg" width="900" height="320" viewBox="0 0 900 320" role="img" aria-labelledby="title desc">
  <title id="title">TxnValueGenerator operations</title>
  <desc id="desc">A static diagram showing TxnValueGenerator methods: payment, asset_transfer, application_call, asset_config, key_registration, asset_freeze, transaction.</desc>
  <defs>
    <style>
      .node { fill: #f8fbff; stroke: #0a5ca8; stroke-width: 2; rx: 10; ry: 10; }
      .label { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; font-size: 16px; fill: #0d243a; }
      .edge { stroke: #0a5ca8; stroke-width: 2; fill: none; }
    </style>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#0a5ca8" />
    </marker>
  </defs>

  <rect class="node" x="350" y="20" width="200" height="46" />
  <text class="label" x="450" y="49" text-anchor="middle">TxnValueGenerator</text>

  <rect class="node" x="35" y="120" width="170" height="44" /><text class="label" x="120" y="148" text-anchor="middle">payment</text>
  <rect class="node" x="245" y="120" width="170" height="44" /><text class="label" x="330" y="148" text-anchor="middle">asset_transfer</text>
  <rect class="node" x="455" y="120" width="170" height="44" /><text class="label" x="540" y="148" text-anchor="middle">application_call</text>
  <rect class="node" x="665" y="120" width="170" height="44" /><text class="label" x="750" y="148" text-anchor="middle">asset_config</text>

  <rect class="node" x="140" y="220" width="170" height="44" /><text class="label" x="225" y="248" text-anchor="middle">key_registration</text>
  <rect class="node" x="365" y="220" width="170" height="44" /><text class="label" x="450" y="248" text-anchor="middle">asset_freeze</text>
  <rect class="node" x="590" y="220" width="170" height="44" /><text class="label" x="675" y="248" text-anchor="middle">transaction</text>

  <path class="edge" marker-end="url(#arrow)" d="M450 66 L120 120" />
  <path class="edge" marker-end="url(#arrow)" d="M450 66 L330 120" />
  <path class="edge" marker-end="url(#arrow)" d="M450 66 L540 120" />
  <path class="edge" marker-end="url(#arrow)" d="M450 66 L750 120" />
  <path class="edge" marker-end="url(#arrow)" d="M450 66 L225 220" />
  <path class="edge" marker-end="url(#arrow)" d="M450 66 L450 220" />
  <path class="edge" marker-end="url(#arrow)" d="M450 66 L675 220" />
</svg>
